<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PrepCreatine — Your AI-powered study companion. Creatine for your exam prep." />
    <title>PrepCreatine — Creatine for your exam prep</title>
    <!-- Theme init: must run before React to prevent flash of wrong theme -->
    <script>
      (function(){
        var t = localStorage.getItem('prepcreatine-theme') || 'system';
        var dark = t === 'dark' || (t === 'system' &&
          window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

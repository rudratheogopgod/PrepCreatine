# ══════════════════════════════════════════════════════════════
# PrepCreatine Backend — application.properties
# All sensitive values loaded from environment variables.
# NEVER hardcode secrets in this file.
# ══════════════════════════════════════════════════════════════

# ── Application ──────────────────────────────────────────────
spring.application.name=prepcreatine-backend
server.port=${PORT:8080}
server.servlet.context-path=/
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html
server.compression.min-response-size=1024

# ── Database ──────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=PrepCreatineHikariPool

# ── Flyway ────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

# ── File Upload ───────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=22MB

# ── Virtual Threads (Java 21) ────────────────────────────────
spring.threads.virtual.enabled=true

# ── Jackson — ISO 8601 UTC timestamps ────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
spring.jackson.deserialization.fail-on-unknown-properties=false

# ── JWT ───────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiry-days=${JWT_EXPIRY_DAYS:7}
jwt.cookie-name=prepcreatine_token
jwt.cookie-domain=${COOKIE_DOMAIN:localhost}
jwt.cookie-secure=${COOKIE_SECURE:true}

# ── CORS ─────────────────────────────────────────────────────
cors.allowed-origins=${FRONTEND_ORIGIN:http://localhost:5173}

# ── Gemini API ────────────────────────────────────────────────
gemini.api-key=${GEMINI_API_KEY}
gemini.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.model=${GEMINI_MODEL:gemini-1.5-flash}
gemini.fallback-model=${GEMINI_FALLBACK_MODEL:gemini-1.5-flash-8b}
gemini.timeout-secs=60
gemini.max-output-tokens=4096
gemini.temperature=0.7

# ── YouTube API ───────────────────────────────────────────────
youtube.api-key=${YOUTUBE_API_KEY}
youtube.base-url=https://www.googleapis.com/youtube/v3
youtube.max-results=5

# ── Reddit API ────────────────────────────────────────────────
reddit.client-id=${REDDIT_CLIENT_ID:}
reddit.client-secret=${REDDIT_CLIENT_SECRET:}
reddit.user-agent=PrepCreatine/1.0 (by Rudra Agrawal)
reddit.base-url=https://oauth.reddit.com
reddit.token-url=https://www.reddit.com/api/v1/access_token
reddit.enabled=${REDDIT_ENABLED:false}

# ── Mail ──────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.from=noreply@prepcreatine.com
mail.from-name=PrepCreatine

# ── Spring Actuator ───────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.app.enabled=true
management.info.env.enabled=true

# ── Logging ───────────────────────────────────────────────────
logging.level.com.prepcreatine=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=INFO

# ══════════════════════════════════════════════════════════════
# PrepCreatine Backend — application-demo.properties
# BSDD v2.1 §8: application-demo.properties [NEW]
#
# Activate with:
#   SPRING_PROFILES_ACTIVE=demo   OR
#   DEMO_MODE=true (env var)
#
# This profile sets demo-specific overrides for the hackathon presentation.
# ══════════════════════════════════════════════════════════════

# Demo mode ON
app.demo-mode=true

# In demo mode: disable strict HTTPS cookie (judges use localhost)
jwt.cookie-secure=false

# In demo mode: allow all CORS origins (judges may use different ports)
cors.allowed-origins=${FRONTEND_ORIGIN:http://localhost:5173}

# In demo mode: very permissive rate limits — judges may click fast
ratelimit.chat=1000
ratelimit.global=1000
ratelimit.youtube=1000

# In demo mode: verbose logging so team can see what's happening live
logging.level.com.prepcreatine=DEBUG
logging.level.com.prepcreatine.demo=DEBUG

# Corpus seeding always on in demo mode
corpus.seed-on-startup=true
corpus.force-reseed=false

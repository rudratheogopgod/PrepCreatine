# ── Production Profile Overrides ─────────────────────────────
# Activate with: -Dspring.profiles.active=prod

spring.jpa.show-sql=false

logging.level.com.prepcreatine=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Structured log pattern for log aggregators (Datadog, CloudWatch, etc.)
logging.pattern.console=%d{ISO8601} %-5level [%X{requestId}] [%X{userId}] %logger{36} - %msg%n

jwt.cookie-secure=true
